version: '3.8'

services:
  akademi-sihir:
    build: .
    container_name: akademi-sihir
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL=anthropic/claude-sonnet-4
      - DATA_DIR=/app/data
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - game_data:/app/data

volumes:
  game_data:
